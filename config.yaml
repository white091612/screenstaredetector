# =========================================
# Screen Watcher 설정 파일
# =========================================

# --- 카메라 설정 ---
camera_index: 0          # 카메라 장치 번호 (기본: 0)
camera_width: 640        # 카메라 해상도 (너비)
camera_height: 480       # 카메라 해상도 (높이)

# --- 책상 배치 (듀얼 모니터) ---
# 카메라(노트북)가 사용자 정면이 아닌 비스듬한 위치에 있는 경우 보정합니다.
#
# [사용자 시점 위에서 본 배치도]
#
#     ┌─────────────────┐        ┌──────────┐
#     │   큰 모니터      │        │  노트북   │
#     │   (정면)         │← 40cm →│  (카메라) │
#     └─────────────────┘        └──────────┘
#                    \ ˜30°  /
#                     사용자
#
# camera_offset_angle: 카메라가 사용자 정면(큰 모니터)으로부터
#   오른쪽으로 몇 도 떨어져 있는지 (오른쪽=양수, 왼쪽=음수)
#   디버그 화면에서 큰 모니터를 볼 때 Y값 ≈ 이 값의 음수
#   예: Y:-51이면 offset을 50으로 설정
camera_offset_angle: 50

# --- 감시 방향 ---
# "screen": 큰 모니터 방향 (+ laptop도 자동 포함)
# "laptop": 노트북(카메라 정면) 방향만
# "screen,laptop": 둘 다 (screen 설정 시 laptop은 자동 포함됨)
# "left", "right", "up", "down": 해당 방향
# 쉼표로 여러 방향 지정 가능: "screen,left"
target_direction: "screen"

# 방향 판단 임계값 (도, degrees)
# 이 범위 이내면 해당 방향으로 인정. 값이 작을수록 엄격
# 듀얼 모니터 시 "screen" 판정 범위:
#   큰 모니터 방향 = yaw_offset ± threshold
#   노트북 방향   = 0° ± threshold
#   실질적으로 두 모니터를 잇는 전체 범위를 커버
direction_threshold: 15

# --- 얼굴 인식 ---
# 인식 엔진: "insightface" (권장) 또는 "dlib" (레거시)
recognition_engine: "insightface"

# InsightFace 모델: "buffalo_l" (정확) 또는 "buffalo_sc" (빠름)
insightface_model: "buffalo_l"

# InsightFace detection input 크기 (높을수록 정확, 느림)
# (640, 640) 권장. 속도 우선이면 (320, 320)으로 낮출 수 있음
insightface_det_size: 640

# Cosine Similarity 임계값 (0.0~1.0, 높을수록 엄격)
# InsightFace 권장: 0.4 (일반) ~ 0.5 (엄격)
face_recognition_threshold: 0.4

# 최대 동시 감지 얼굴 수
max_faces: 4

# --- 캡쳐 설정 ---
# 캡쳐 간격 (초)
capture_interval: 10

# 스크린 캡쳐도 같이 저장할지 여부
# true = mss로 화면 캡쳐 (카메라 앱이 뜨지 않음)
# false = 카메라 프레임만 저장 (silent, 기본값)
also_capture_screen: false

# --- 화면 잠금 ---
# 미등록 사용자 감지 시 화면 잠금 (Win+L 동작)
lock_screen_on_unknown: true

# 잠금 후 재잠금까지 대기 시간 (초)
# 잠금 해제 직후 다시 잠기는 것을 방지합니다
lock_cooldown: 30

# --- 경로 설정 ---
face_data_dir: "./registered_faces"
capture_dir: "./captures"
log_file: "screenwatcher.log"

# --- 처리 간격 (Intervals) ---
# 상황별로 다른 간격이 적용됩니다:
#
#   [얼굴 감지] ─── process_interval (0.5초) ───→ 정상 감시
#                          │
#                   미등록자 감지
#                          ↓
#   [재확인 중] ─── confirm_interval (0.5초) ───→ confirm_duration동안 반복
#                          │                      confirm_threshold회 이상 → 잠금
#                   얼굴 사라짐
#                          ↓
#   [얼굴 없음] ─── idle_interval (2.0초) ─────→ CPU 절약 모드
#
process_interval: 0.5      # 얼굴 감지 시 기본 처리 간격 (초)
idle_interval: 2.0         # 얼굴 미감지 시 느린 처리 간격 (초)
confirm_interval: 0.5      # 미등록자 재확인 간격 (초)

# --- 미등록자 확인 ---
# 미등록자 감지 즉시 잠금하지 않고, 재확인하여 오탐을 방지합니다.
# confirm_duration(초) 동안 confirm_interval 간격으로 확인하여
# confirm_threshold(회) 이상 미등록으로 나오면 확정합니다.
#
# 예: duration=2.0, interval=0.5 → 최대 4회 확인
#     threshold=3 → 4회 중 3회 이상 미등록이면 잠금
confirm_duration: 2.0      # 재확인 지속 시간 (초)
confirm_threshold: 3       # 미등록 확정 최소 횟수

# 미리보기 창 표시 (디버그용)
show_preview: false

# --- 성능 튜닝 ---

# 프레임 변화 감지 임계값 (0~255). 이 값 이하의 변화는 무시하고 캐시된 결과 사용
# 낮을수록 민감 (작은 움직임도 감지), 높을수록 둔감 (CPU 절약)
# 권장: 3.0 (민감) ~ 8.0 (절약)
motion_threshold: 5.0

# 인식 결과 캐시 유지 시간 (초). 같은 위치의 얼굴 결과를 재사용
# 높을수록 CPU 절약, 낮을수록 빠른 반응
recognition_cache_ttl: 3.0

# ONNX Runtime 스레드 수 (InsightFace 추론용)
# 1 = 최소 CPU (느림), 2 = 균형 (권장), 4 = 빠름 (CPU 높음)
onnx_threads: 2
